<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bhutan S2S Imputation Dashboard</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #002B49;
    --secondary: #708090;
    --mahal: #D62828;
    --euclid: #8338EC;
    --canberra: #06D6A0;
    --imputed: #D62828;
    --grid: #F1F3F5;
    --bg: #FDFDFD;
    --border: #CED4DA;
    --text: #1e293b;
    --muted: #64748b;
    --light: #f8fafc;
  }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }
  
  /* SIDEBAR */
  aside {
    width: 280px; min-width: 280px; background: var(--primary); color: white;
    display: flex; flex-direction: column; padding: 2rem 1.5rem;
    box-shadow: 4px 0 20px rgba(0,0,0,0.15); position: sticky; top: 0; height: 100vh; overflow-y: auto;
  }
  .brand { border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1.5rem; margin-bottom: 2rem; }
  .brand h1 { font-size: 1.25rem; font-weight: 800; letter-spacing: 0.2em; text-transform: uppercase; }
  .brand span { font-size: 0.75rem; color: rgba(255,255,255,0.5); font-weight: 400; }
  nav { display: flex; flex-direction: column; gap: 0.35rem; }
  nav button {
    background: none; border: none; color: rgba(255,255,255,0.55); text-align: left;
    padding: 0.75rem 1rem; font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase;
    font-weight: 700; cursor: pointer; border-radius: 3px; transition: all 0.2s; font-family: inherit;
  }
  nav button:hover { background: rgba(255,255,255,0.06); color: white; }
  nav button.active { background: white; color: var(--primary); font-weight: 800; }

  /* MAIN */
  main { flex: 1; overflow-y: auto; }
  header { padding: 2.5rem 3.5rem 2rem; border-bottom: 1px solid var(--border); }
  header h2 { font-size: 2rem; font-weight: 800; letter-spacing: -0.03em; text-transform: uppercase; }
  .content { padding: 2.5rem 3.5rem; max-width: 1300px; }

  /* TABS */
  .tab-view { display: none; }
  .tab-view.active { display: block; }

  /* CONTROLS */
  .controls-row { display: flex; gap: 1.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
  .ctrl-group { display: flex; flex-direction: column; gap: 0.5rem; min-width: 160px; }
  .ctrl-group label { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.25em; color: var(--muted); }
  .ctrl-group .ctrl-btns { display: flex; flex-direction: column; border: 1px solid var(--border); border-radius: 3px; overflow: hidden; background: white; }
  .ctrl-btns button {
    background: none; border: none; border-bottom: 1px solid #f1f3f5; padding: 0.6rem 1rem;
    text-align: left; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--muted); cursor: pointer; font-family: inherit; transition: all 0.2s;
  }
  .ctrl-btns button:last-child { border-bottom: none; }
  .ctrl-btns button:hover { background: #f8fafc; }
  .ctrl-btns button.active { background: var(--primary); color: white; }

  /* TOGGLE PILLS */
  .toggle-pills { display: flex; background: #f1f3f5; border: 1px solid var(--border); border-radius: 3px; padding: 3px; margin-bottom: 1.5rem; max-width: 480px; }
  .toggle-pills button {
    flex: 1; background: none; border: none; padding: 0.6rem 0.5rem;
    font-size: 0.6rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.15em;
    color: var(--muted); cursor: pointer; border-radius: 2px; font-family: inherit; transition: all 0.2s;
  }
  .toggle-pills button.active { background: white; color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.08); border: 1px solid var(--border); }

  /* CHART CARD */
  .chart-card { background: white; border: 1px solid var(--border); padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
  .chart-wrap { position: relative; }

  /* LEGEND */
  .legend { display: flex; justify-content: center; gap: 2rem; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #f1f5f9; }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 0; }

  /* TABLE */
  .data-table { width: 100%; border-collapse: collapse; font-size: 0.7rem; border: 1px solid var(--border); background: white; }
  .data-table th { background: #f8fafc; padding: 0.75rem 1rem; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.2em; color: var(--muted); border-bottom: 1px solid var(--border); }
  .data-table td { padding: 0.6rem 1rem; border-bottom: 1px solid #f1f5f9; color: var(--muted); }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: #f8fafc; }
  .data-table .mono { font-family: 'Courier New', monospace; font-weight: 700; color: var(--text); font-size: 0.68rem; }
  .data-table .label { font-weight: 800; color: var(--text); text-transform: uppercase; letter-spacing: 0.08em; font-size: 0.65rem; }
  th.sep { border-left: 1px solid var(--border); }
  td.sep { border-left: 1px solid #f1f5f9; }

  /* METRIC PILLS */
  .metric-pills { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.5rem; }
  .metric-pill {
    background: none; border: 1px solid var(--border); padding: 0.35rem 0.9rem;
    font-size: 0.58rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--muted); cursor: pointer; font-family: inherit; border-radius: 2px; transition: all 0.2s;
  }
  .metric-pill.active { background: var(--primary); border-color: var(--primary); color: white; }

  /* COMPARE CONTROLS */
  .compare-controls { display: flex; justify-content: flex-end; margin-bottom: 1rem; gap: 0.75rem; align-items: center; }
  .view-toggle { display: flex; border: 1px solid var(--border); background: white; border-radius: 3px; overflow: hidden; }
  .view-toggle button { background: none; border: none; border-right: 1px solid var(--border); padding: 0.5rem 0.75rem; cursor: pointer; color: var(--muted); font-size: 0.7rem; font-family: inherit; transition: all 0.2s; }
  .view-toggle button:last-child { border-right: none; }
  .view-toggle button.active { background: var(--primary); color: white; }
  .view-select { border: 1px solid var(--border); border-radius: 3px; padding: 0.45rem 0.75rem; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text); background: white; cursor: pointer; font-family: inherit; }

  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
  .charts-grid.single { grid-template-columns: 1fr; }
  .chart-sub-label { text-align: center; font-size: 0.58rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.25em; color: var(--muted); margin-bottom: 0.75rem; }

  footer { margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid var(--border); padding-bottom: 2rem; }
  footer span { font-size: 0.65rem; color: #cbd5e1; }
</style>
</head>

        </div>

      </div>
    </div>

    <!-- DEMOGRAPHICS -->
    <div id="tab-demographics" class="tab-view">
      <div id="demo-content"></div>
    </div>

    <!-- EDUCATION -->
    <div id="tab-education" class="tab-view">

    </div>

    <div id="tab-welfare" class="tab-view">

    </div>

    <!-- DENSITY / ECDF -->

        <button id="ecdf-btn" onclick="setDensityTab('ecdf')">ECDF Curve</button>
      </div>

        <div class="legend">

          <div class="legend-item"><div class="legend-dot" style="background:var(--secondary)"></div>LFS 2022 (Imputed)</div>
        </div>
      </div>
    </div>

    <!-- ACCURACY -->
    <div id="tab-accuracy" class="tab-view">
      <div class="toggle-pills">
        <button class="active" id="acc-poverty-btn" onclick="setAccuracyTab('poverty')">Poverty Rate</button>
        <button id="acc-gini-btn" onclick="setAccuracyTab('inequality')">Inequality (Gini)</button>
      </div>
      <div class="chart-card">
        <div class="chart-wrap"><canvas id="accuracyChart" height="380"></canvas></div>
      </div>
    </div>

    <!-- QUITO TRENDS -->
    <div id="tab-quito" class="tab-view">
      <div class="toggle-pills">

        </div>
      </div>
      <div id="quito-table"></div>
    </div>

    <footer><span>&#9632; Bhutan S2S Imputation Dashboard</span></footer>
  </div>
</main>

// ============================================================
// COMPARISON VIEW (Demographics, Welfare, Education)
// ============================================================
function renderComparison(prefix, data, formatFn, container) {
  if (!container) return;
  const selectedMetrics = new Set(data.metrics);
  let chartType = 'bar';
  let povertyView = 'both';
  let poorChart, nonPoorChart;

  function html() {
    return `
      <div style="display:flex;justify-content:flex-end;gap:1rem;margin-bottom:1rem;align-items:center;">
        <div class="view-toggle">
          <button id="${prefix}-bar" class="${chartType==='bar'?'active':''}" onclick="window['${prefix}_setChart']('bar')">Bar</button>
          <button id="${prefix}-spider" class="${chartType==='spider'?'active':''}" onclick="window['${prefix}_setChart']('spider')">Radar</button>
        </div>
        <select class="view-select" id="${prefix}-pov-sel" onchange="window['${prefix}_setPov'](this.value)">
          <option value="both" ${povertyView==='both'?'selected':''}>Poor & Non-Poor</option>
          <option value="poor" ${povertyView==='poor'?'selected':''}>Poor</option>
          <option value="nonPoor" ${povertyView==='nonPoor'?'selected':''}>Non-Poor</option>
        </select>
      </div>
      <div class="metric-pills" id="${prefix}-pills">
        ${data.metrics.map(m => `<button class="metric-pill ${selectedMetrics.has(m)?'active':''}" onclick="window['${prefix}_toggleMetric']('${m}')">${m}</button>`).join('')}
      </div>
      <div class="chart-card">
        <div class="${povertyView==='both'?'charts-grid':'charts-grid single'}">
          ${povertyView !== 'nonPoor' ? `<div><div class="chart-sub-label">POOR</div><div class="chart-wrap"><canvas id="${prefix}-poor-chart" height="280"></canvas></div></div>` : ''}
          ${povertyView !== 'poor' ? `<div><div class="chart-sub-label">NON-POOR</div><div class="chart-wrap"><canvas id="${prefix}-nonpoor-chart" height="280"></canvas></div></div>` : ''}
        </div>
        <div class="legend" style="margin-top:1rem;">
          <div class="legend-item"><div class="legend-dot" style="background:#002B49"></div>BLSS 2022</div>
          <div class="legend-item"><div class="legend-dot" style="background:#708090"></div>LFS 2022 (Imputed)</div>
        </div>
      </div>
      <div style="overflow:auto;margin-bottom:2rem;">
        <table class="data-table">
          <thead>
            <tr>
              <th>Indicator</th>
              <th class="sep" colspan="2" style="text-align:center;">Poor</th>
              <th class="sep" colspan="2" style="text-align:center;">Non-Poor</th>
            </tr>
            <tr>
              <th></th>
              <th class="sep" style="text-align:center;font-size:.55rem;">BLSS 2022</th>
              <th style="text-align:center;font-size:.55rem;">LFS 2022</th>
              <th class="sep" style="text-align:center;font-size:.55rem;">BLSS 2022</th>
              <th style="text-align:center;font-size:.55rem;">LFS 2022</th>
            </tr>
          </thead>
          <tbody>
            ${data.metrics.filter(m=>selectedMetrics.has(m)).map(metric=>{
              const p=data.poor.find(d=>d.metric===metric)||{BLSS:0,LFS:0};
              const np=data.nonPoor.find(d=>d.metric===metric)||{BLSS:0,LFS:0};
              return `<tr>
                <td class="label">${metric}</td>
                <td class="mono sep" style="text-align:center;">${formatFn(p.BLSS)}</td>
                <td class="mono" style="text-align:center;">${formatFn(p.LFS)}</td>
                <td class="mono sep" style="text-align:center;">${formatFn(np.BLSS)}</td>
                <td class="mono" style="text-align:center;">${formatFn(np.LFS)}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    `;
  }

  function renderCharts() {
    const metrics = data.metrics.filter(m => selectedMetrics.has(m));
    if (poorChart) poorChart.destroy();
    if (nonPoorChart) nonPoorChart.destroy();
    const type = chartType === 'bar' ? 'bar' : 'radar';

    if (povertyView !== 'nonPoor') {
      const el = document.getElementById(`${prefix}-poor-chart`);
      if (el) {
        const poorDataBLSS = metrics.map(m => (data.poor.find(d=>d.metric===m)||{BLSS:0}).BLSS);
        const poorDataLFS = metrics.map(m => (data.poor.find(d=>d.metric===m)||{LFS:0}).LFS);
        poorChart = buildCompChart(el, type, metrics, poorDataBLSS, poorDataLFS);
      }
    }
    if (povertyView !== 'poor') {
      const el = document.getElementById(`${prefix}-nonpoor-chart`);
      if (el) {
        const npDataBLSS = metrics.map(m => (data.nonPoor.find(d=>d.metric===m)||{BLSS:0}).BLSS);
        const npDataLFS = metrics.map(m => (data.nonPoor.find(d=>d.metric===m)||{LFS:0}).LFS);
        nonPoorChart = buildCompChart(el, type, metrics, npDataBLSS, npDataLFS);
      }
    }
  }

  function buildCompChart(el, type, labels, blss, lfs) {
    const isRadar = type === 'radar';
    return new Chart(el, {
      type,
      data: {
        labels,
        datasets: [
          { label: 'BLSS 2022', data: blss, backgroundColor: isRadar ? 'rgba(0,43,73,0.08)' : COLORS.primary, borderColor: COLORS.primary, borderWidth: isRadar ? 2 : 0, pointBackgroundColor: COLORS.primary },
          { label: 'LFS 2022 (Imputed)', data: lfs, backgroundColor: isRadar ? 'rgba(112,128,144,0.08)' : COLORS.secondary, borderColor: COLORS.secondary, borderWidth: isRadar ? 2 : 0, pointBackgroundColor: COLORS.secondary }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: true,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + formatFn(ctx.raw) } } },
        scales: isRadar ? {} : {
          x: { grid: { display: false }, ticks: { font: { size: 9 }, maxRotation: 30 } },
          y: { grid: { color: '#F1F3F5' }, ticks: { callback: v => formatFn(v), font: { size: 9 } }, border: { display: false } }
        }
      }
    });
  }

  window[`${prefix}_toggleMetric`] = (m) => {
    if (selectedMetrics.has(m)) { if (selectedMetrics.size > 1) selectedMetrics.delete(m); }
    else selectedMetrics.add(m);
    container.innerHTML = html(); renderCharts();
  };
  window[`${prefix}_setChart`] = (t) => { chartType = t; container.innerHTML = html(); renderCharts(); };
  window[`${prefix}_setPov`] = (v) => { povertyView = v; container.innerHTML = html(); renderCharts(); };

  container.innerHTML = html();
  renderCharts();
}

// ============================================================
// ACCURACY CHART (scatter + error bars via custom plugin)
// ============================================================
function renderAccuracyChart() {
  const data = accuracyTab === 'poverty' ? povertyAccuracyData : inequalityAccuracyData;
  const isPov = accuracyTab === 'poverty';
  const fmt = v => isPov ? v.toFixed(2)+'%' : v.toFixed(2);

  if (accuracyChart) accuracyChart.destroy();

  const errorBarPlugin = {
    id: 'errorBar',
    afterDatasetsDraw(chart) {
      const {ctx} = chart;
      chart.data.datasets[0].data.forEach((pt, i) => {
        const meta = chart.getDatasetMeta(0);
        const el = meta.data[i];
        if (!el) return;
        const entry = data[i];
        if (!entry) return;
        const yLow = chart.scales.y.getPixelForValue(entry.low);
        const yHigh = chart.scales.y.getPixelForValue(entry.high);
        const x = el.x;
        ctx.save();
        ctx.strokeStyle = '#94A3B8'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(x, yLow); ctx.lineTo(x, yHigh); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x-5, yLow); ctx.lineTo(x+5, yLow); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x-5, yHigh); ctx.lineTo(x+5, yHigh); ctx.stroke();
        ctx.restore();
      });
    }
  };

  accuracyChart = new Chart(document.getElementById('accuracyChart'), {
    type: 'scatter',
    plugins: [errorBarPlugin],
    data: {
      datasets: [{
        label: 'Estimate',
        data: data.map((d,i) => ({x: i, y: d.estimate})),
        backgroundColor: data.map(d => d.color),
        pointRadius: 7, pointHoverRadius: 9,
        borderColor: 'white', borderWidth: 2
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: {
          label: ctx => {
            const d = data[ctx.dataIndex];
            return [`Estimate: ${fmt(d.estimate)}`, `CI: ${fmt(d.low)} – ${fmt(d.high)}`];
          },
          title: ctx => data[ctx[0].dataIndex].name
        }}
      },
      scales: {
        x: {
          type: 'linear', min: -0.5, max: data.length - 0.5,
          ticks: {
            callback: (v) => {
              const d = data[Math.round(v)];
              return d ? d.name : '';
            },
            stepSize: 1, maxRotation: 30, font: { size: 9, weight: 700 }
          },
          grid: { display: false }
        },
        y: {
          min: isPov ? 7 : 20, max: isPov ? 16 : 45,
          grid: { color: '#F1F3F5' },
          title: { display: true, text: isPov ? 'Poverty rate (%)' : 'Gini Coefficient', color: '#94a3b8', font: { size: 11, weight: 600 } },
          ticks: { font: { size: 10 } }, border: { display: false }
        }
      }
    }
  });
}

function setAccuracyTab(tab) {
  accuracyTab = tab;
  document.getElementById('acc-poverty-btn').classList.toggle('active', tab === 'poverty');
  document.getElementById('acc-gini-btn').classList.toggle('active', tab === 'inequality');
  renderAccuracyChart();
}

// ============================================================
// QUITO TRENDS
// ============================================================
function renderQuitoChart() {
  const data = quitoTab === 'poor' ? quitoPoorData : quitoGinData;
  const isPov = quitoTab === 'poor';
  const fmt = v => isPov ? v.toFixed(2)+'%' : v.toFixed(2);

  const errorBarPlugin = {
    id: 'quitoEB',
    afterDatasetsDraw(chart) {
      const {ctx} = chart;
      chart.data.datasets[0].data.forEach((pt, i) => {
        const meta = chart.getDatasetMeta(0);
        const el = meta.data[i];
        if (!el) return;
        const entry = data[i];
        const yLow = chart.scales.y.getPixelForValue(entry.low);
        const yHigh = chart.scales.y.getPixelForValue(entry.high);
        const x = el.x;
        ctx.save();
        ctx.strokeStyle = '#94A3B8'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(x, yLow); ctx.lineTo(x, yHigh); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x-5, yLow); ctx.lineTo(x+5, yLow); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x-5, yHigh); ctx.lineTo(x+5, yHigh); ctx.stroke();
        ctx.restore();
      });
    }
  };

  if (quitoChart) quitoChart.destroy();
  quitoChart = new Chart(document.getElementById('quitoChart'), {
    type: 'scatter',
    plugins: [errorBarPlugin],
    data: {
      datasets: [{
        data: data.map((d, i) => ({x: i, y: d.estimate})),
        backgroundColor: data.map(d => d.color),
        pointRadius: 7, pointHoverRadius: 9,
        borderColor: 'white', borderWidth: 2
      },{
        // trend line (imputed only)
        type: 'line',
        data: data.map((d, i) => i === 0 ? null : {x: i, y: d.estimate}),
        borderColor: COLORS.imputed, borderWidth: 2, borderDash: [5,5],
        pointRadius: 0, fill: false
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: {
          label: ctx => {
            if (ctx.datasetIndex !== 0) return null;
            const d = data[ctx.dataIndex];
            return [`Estimate: ${fmt(d.estimate)}`, `CI: ${fmt(d.low)} – ${fmt(d.high)}`];
          },
          title: ctx => {
            if (ctx[0].datasetIndex !== 0) return null;
            return data[ctx[0].dataIndex].name;
          }
        }}
      },
      scales: {
        x: {
          type: 'linear', min: -0.5, max: data.length - 0.5,
          ticks: { callback: v => { const d = data[Math.round(v)]; return d ? d.name : ''; }, stepSize: 1, maxRotation: 20, font: { size: 9, weight: 700 } },
          grid: { display: false }
        },
        y: {
          min: isPov ? 7 : 25, max: isPov ? 15 : 33,
          grid: { color: '#F1F3F5' },
          title: { display: true, text: isPov ? 'Poverty rate (%)' : 'Gini Coefficient', color: '#94a3b8', font: { size: 11, weight: 600 } },
          ticks: { font: { size: 10 } }, border: { display: false }
        }
      }
    }
  });

  // Table
  const t = document.getElementById('quito-table');
  t.innerHTML = `<table class="data-table">
    <thead><tr>
      <th>Series</th><th>Estimate</th><th>CI (Lower)</th><th>CI (Upper)</th>
    </tr></thead>
    <tbody>
      ${data.map(row => `<tr>
        <td class="label">${row.name}</td>
        <td class="mono">${fmt(row.estimate)}</td>
        <td class="mono">${fmt(row.low)}</td>
        <td class="mono">${fmt(row.high)}</td>
      </tr>`).join('')}
    </tbody>
  </table>`;
}

function setQuitoTab(tab) {
  quitoTab = tab;
  document.getElementById('quito-poor-btn').classList.toggle('active', tab === 'poor');
  document.getElementById('quito-gini-btn').classList.toggle('active', tab === 'gini');
  renderQuitoChart();
}
